name: Build RXB Windows (No GUI)
on: [push, workflow_dispatch]

jobs:
  build-windows:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install build-essential libtool autotools-dev automake pkg-config bsdmainutils curl git g++-mingw-w64-x86-64 -y
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix

      - name: Fix Missing Depends
        env:
          BTC_URL: "https://github.com"
        run: |
          # Usiamo la variabile d'ambiente per nascondere l'URL al parser
          git clone --depth 1 --branch v0.20.1 "$BTC_URL" btc_temp
          mkdir -p depends
          cp -rv btc_temp/depends/* depends/
          rm -rf btc_temp
          ls -la depends/Makefile

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 -j$(nproc) NO_QT=1

      - name: Build RXB Core
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure --prefix=/ --disable-tests --disable-bench --with-incompatible-bdb --without-gui
          make -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RXB-Core-Windows-NoGUI
          path: |
            src/rxbd.exe
            src/rxb-cli.exe
